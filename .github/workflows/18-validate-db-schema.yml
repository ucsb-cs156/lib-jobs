# Boots the src/test TestApplication (via spring-boot:run configured with
# useTestClasspath) with ddl-auto=validate, so Hibernate checks the Job
# entity against the schema created by the shipped Liquibase changelog
# (src/main/resources/db/migration/lib-jobs).

name: "18-validate-db-schema: Ensure Migration File Matches Entity Files"

on:
  workflow_dispatch:
  pull_request:
    paths: [src/**, pom.xml, lombok.config, .github/workflows/18-validate-db-schema.yml]
  push:
    branches: [ main ]
    paths: [src/**, pom.xml, lombok.config, .github/workflows/18-validate-db-schema.yml]

jobs:
  call-validate-db-schema:
    uses: ucsb-cs156/workflows/.github/workflows/18-validate-db-schema.yml@main
    with:
      JAVA_DISTRIBUTION: ${{ vars.JAVA_DISTRIBUTION || 'temurin' }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
