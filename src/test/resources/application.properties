spring.jpa.open-in-view=false

# The library's own tests run against the schema created by the shipped
# Liquibase changelog, and Hibernate validates the entities against it,
# so any drift between Job and the changelog fails every test run
# (and CI workflow 18-validate-db-schema).
spring.liquibase.change-log=db/migration/lib-jobs/changelog-master.json
spring.jpa.hibernate.ddl-auto=validate
